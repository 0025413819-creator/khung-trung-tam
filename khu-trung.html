<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phương pháp khử trùng</title>
<style>
  :root{
    --bg:#0a0e14; --bg2:#10151d; --panel:#141a24; --panel2:#1a212c;
    --line:#252e3a; --text:#e8edf4; --sub:#7f8ea3; --mute:#54607a;
    --accent:#22d3ee;
  }
  body.light{
    --bg:#eef1f5; --bg2:#e3e8ee; --panel:#ffffff; --panel2:#f3f5f8;
    --line:#d2d9e2; --text:#15202b; --sub:#5b6776; --mute:#8893a3;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%; overflow:hidden;
    background:radial-gradient(circle at 20% 0%, var(--bg2), var(--bg) 60%);
    font-family:'Segoe UI',Roboto,Arial,sans-serif; color:var(--text);
    transition:background .5s,color .5s;
  }
  .stage{ position:relative; width:100%; height:100vh; }

  /* TOP BAR */
  .topbar{
    position:absolute; top:0; left:0; right:0; height:54px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px; z-index:50;
  }
  .brandwrap{ display:flex; align-items:baseline; gap:10px; }
  .title-main{
    font-family:'Consolas','Courier New',monospace; font-size:20px; letter-spacing:3px;
    font-weight:700; color:var(--text);
  }
  .title-sub{
    font-size:9px; letter-spacing:2px; color:var(--mute); text-transform:uppercase;
  }
  .pon{
    font-size:10px; color:var(--mute); letter-spacing:2px; opacity:.6;
    font-family:'Consolas',monospace;
  }
  .toggle-wrap{ display:flex; align-items:center; gap:8px; }
  .toggle-label{ font-size:10px; color:var(--mute); letter-spacing:1px; text-transform:uppercase;}
  .switch{
    width:46px; height:24px; border-radius:14px; background:var(--panel2);
    border:1px solid var(--line); position:relative; cursor:pointer;
  }
  .switch .knob{
    position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
    background:var(--accent); transition:left .25s ease; box-shadow:0 0 8px var(--accent);
  }
  body.light .switch .knob{ left:24px; background:#444; box-shadow:none;}

  /* GRID OF METHOD CARDS */
  .grid{
    position:absolute; top:64px; left:0; right:0; bottom:10px;
    display:grid; grid-template-columns:repeat(6,1fr); gap:14px;
    padding:0 22px;
  }
  .card{
    position:relative; border-radius:10px; background:var(--panel);
    border:1px solid var(--line); cursor:pointer; overflow:hidden;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:16px 12px; transition:transform .25s, box-shadow .25s, border-color .25s;
  }
  .card:hover{ transform:translateY(-6px); border-color:var(--mcolor); box-shadow:0 14px 30px -10px var(--mcolor); }
  .card .glow{
    position:absolute; top:-40%; left:-20%; width:160%; height:160%;
    background:radial-gradient(circle, var(--mcolor) 0%, transparent 60%);
    opacity:.10; pointer-events:none; transition:opacity .3s;
  }
  .card:hover .glow{ opacity:.22; }
  .card .icon{ font-size:34px; margin-bottom:10px; filter:drop-shadow(0 0 10px var(--mcolor)); }
  .card .name{ font-size:14px; font-weight:700; color:var(--mcolor); line-height:1.25; letter-spacing:.3px;}
  .card .tag{ font-size:10px; color:var(--sub); margin-top:6px; letter-spacing:.5px; }
  .card .num{
    position:absolute; top:10px; right:12px; font-size:10px; color:var(--mute);
    font-family:'Consolas',monospace;
  }
  .card .pulse-dot{
    position:absolute; top:14px; left:12px; width:7px; height:7px; border-radius:50%;
    background:var(--mcolor); box-shadow:0 0 6px var(--mcolor);
    animation:blink 2s infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.25} }

  /* OVERLAY DETAIL */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; z-index:200;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .overlay.open{ opacity:1; pointer-events:all; }
  .panel{
    width:min(1180px,94vw); height:min(680px,92vh); background:var(--panel);
    border:1px solid var(--line); border-radius:16px; display:flex; overflow:hidden;
    transform:scale(.94) translateY(10px); transition:transform .3s; box-shadow:0 30px 80px -20px #000;
  }
  .overlay.open .panel{ transform:scale(1) translateY(0); }

  .panel-left{
    flex:1.05; padding:26px 26px 18px; display:flex; flex-direction:column; gap:14px; overflow-y:auto;
    border-right:1px solid var(--line);
  }
  .panel-right{ flex:1; padding:26px; display:flex; flex-direction:column; gap:14px; overflow-y:auto; background:var(--bg2);}

  .ph-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .ph-title{ font-size:22px; font-weight:800; color:var(--mcolor); letter-spacing:.3px;}
  .ph-eng{ font-size:11px; color:var(--mute); letter-spacing:1.5px; text-transform:uppercase; margin-top:3px;}
  .closebtn{
    width:30px; height:30px; border-radius:50%; border:1px solid var(--line); background:var(--panel2);
    color:var(--sub); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .closebtn:hover{ color:var(--mcolor); border-color:var(--mcolor); }

  .desc{ font-size:13px; line-height:1.65; color:var(--text); opacity:.92; }
  .sectionlabel{
    font-size:10px; letter-spacing:2px; color:var(--mcolor); text-transform:uppercase; font-weight:700;
    margin-top:6px; display:flex; align-items:center; gap:8px;
  }
  .sectionlabel::after{ content:''; flex:1; height:1px; background:var(--line); }

  .steps{ display:flex; flex-direction:column; gap:7px; }
  .step{ display:flex; gap:10px; font-size:12.5px; color:var(--sub); line-height:1.5;}
  .step b{ color:var(--text); font-weight:600;}
  .step .si{
    flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--panel2);
    border:1px solid var(--mcolor); color:var(--mcolor); font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
  }

  .notebox{
    background:var(--panel2); border-left:3px solid var(--mcolor); border-radius:6px;
    padding:10px 12px; font-size:12px; color:var(--sub); line-height:1.55;
  }
  .notebox b{ color:var(--mcolor); }

  .paramgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .paramcard{
    background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:8px 10px;
  }
  .paramcard .plabel{ font-size:9px; letter-spacing:1px; color:var(--mute); text-transform:uppercase;}
  .paramcard .pval{ font-size:16px; font-weight:800; color:var(--mcolor); font-family:'Consolas',monospace;}

  /* MACHINE CONSOLE — realistic device bezel */
  .device{
    flex-shrink:0; background:
      linear-gradient(180deg, rgba(255,255,255,.04), transparent 30%),
      linear-gradient(155deg,var(--panel2) 0%, var(--panel) 60%);
    border:1px solid var(--line); border-radius:14px; padding:3px;
    position:relative; box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px -18px #000;
  }
  .device::before{
    content:''; position:absolute; inset:0; border-radius:14px; pointer-events:none;
    background:radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.05), transparent 60%);
  }
  .device-inner{
    border:1px solid var(--line); border-radius:11px; padding:16px 16px 14px;
    background:linear-gradient(180deg, rgba(0,0,0,.12), transparent 40%);
    position:relative;
  }
  .device-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .device-brand{ font-size:9px; letter-spacing:2px; color:var(--mute); font-family:'Consolas',monospace; text-transform:uppercase;}
  .device-brand b{ color:var(--mcolor); }
  .machine .ledrow{ display:flex; gap:7px; }
  .led{ width:8px; height:8px; border-radius:50%; background:#1c222b; box-shadow:inset 0 0 2px #000; position:relative; transition:.3s;}
  .led.on{ background:var(--mcolor); box-shadow:0 0 9px var(--mcolor), 0 0 2px #fff inset; animation:blink 1.4s infinite; }
  .led-label{ font-size:7px; color:var(--mute); letter-spacing:1px; text-align:center; margin-top:3px; display:block;}

  .screen{
    background:
      repeating-linear-gradient(rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(120% 140% at 50% -10%, rgba(255,255,255,.06), transparent 55%),
      #03070b;
    border:1px solid #000; border-radius:9px; padding:14px 16px;
    font-family:'Consolas','Courier New',monospace; color:var(--mcolor); margin-bottom:14px;
    box-shadow:inset 0 0 22px rgba(0,0,0,.8), inset 0 0 2px rgba(255,255,255,.04);
    position:relative; overflow:hidden;
  }
  body.light .screen{ background-color:#0d1117; }
  .screen .sline{ font-size:10px; display:flex; justify-content:space-between; margin-bottom:6px; opacity:.8; letter-spacing:1px;}
  .screen .big{ font-size:36px; font-weight:800; letter-spacing:2px; text-shadow:0 0 14px var(--mcolor); font-family:'Consolas',monospace; line-height:1; }
  .screen .status{ font-size:10.5px; letter-spacing:.5px; margin-top:2px;}
  .screen .cursor{ display:inline-block; width:7px; height:11px; background:var(--mcolor); margin-left:6px; vertical-align:-2px; animation:cursorBlink 1s steps(1) infinite; box-shadow:0 0 5px var(--mcolor);}
  @keyframes cursorBlink{ 50%{opacity:0;} }

  /* phase stepper */
  .phasebar{ display:flex; gap:4px; margin-bottom:14px; }
  .phase{
    flex:1; text-align:center; padding:7px 4px; border-radius:6px; background:var(--panel2);
    border:1px solid var(--line); font-size:8.5px; letter-spacing:.4px; color:var(--mute);
    text-transform:uppercase; transition:.3s; position:relative; font-weight:700;
  }
  .phase.active{ background:var(--mcolor); color:#06090d; border-color:var(--mcolor); box-shadow:0 0 10px -2px var(--mcolor); }
  .phase.done{ color:var(--mcolor); border-color:var(--mcolor); opacity:.7; }

  .gaugewrap{ display:flex; gap:16px; align-items:center; margin-bottom:14px; }
  .gauge{ position:relative; width:92px; height:92px; flex-shrink:0; }
  .gauge svg{ width:100%; height:100%; transform:rotate(-90deg); filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  .gauge .gbg{ fill:none; stroke:var(--line); stroke-width:7; }
  .gauge .gtick{ fill:none; stroke:var(--mute); stroke-width:1; opacity:.4; }
  .gauge .gval{ fill:none; stroke:var(--mcolor); stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1); filter:drop-shadow(0 0 5px var(--mcolor));}
  .gauge .gnum{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; font-family:'Consolas',monospace;
  }
  .gauge .gnum b{ font-size:16px; color:var(--text); transition:.3s; }
  .gauge .gnum span{ font-size:7.5px; color:var(--mute); letter-spacing:.5px; margin-top:1px;}

  .progress-shell{ margin-bottom:14px; }
  .progress-bar{
    height:12px; border-radius:7px; background:var(--panel2); border:1px solid var(--line);
    overflow:hidden; position:relative; box-shadow:inset 0 1px 3px rgba(0,0,0,.4);
  }
  .progress-fill{
    height:100%; width:0%; background:linear-gradient(90deg,var(--mcolor2,var(--mcolor)),var(--mcolor));
    transition:width .25s linear; box-shadow:0 0 10px var(--mcolor); position:relative;
  }
  .progress-fill::after{
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 8px, transparent 8px 16px);
    opacity:.5;
  }
  .progress-fill.running::after{ animation:barslide 1s linear infinite; }
  @keyframes barslide{ from{background-position-x:0;} to{background-position-x:32px;} }
  .progress-marks{ display:flex; justify-content:space-between; margin-top:5px; font-size:8px; color:var(--mute); letter-spacing:.5px;}

  .ctrl-row{ display:flex; gap:10px; margin-top:auto; }
  .btn{
    flex:1; padding:12px 8px; border-radius:9px; border:1px solid var(--line); background:var(--panel2);
    color:var(--text); font-size:12px; font-weight:700; letter-spacing:.5px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px; transition:.18s;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset;
  }
  .btn:hover:not(:disabled){ border-color:var(--mcolor); color:var(--mcolor); transform:translateY(-1px); }
  .btn:active:not(:disabled){ transform:translateY(0px) scale(.98); }
  .btn.primary{ background:linear-gradient(180deg,var(--mcolor),var(--mcolor2,var(--mcolor))); color:#06090d; border-color:var(--mcolor); box-shadow:0 4px 14px -4px var(--mcolor); }
  .btn.primary:hover{ filter:brightness(1.08); color:#06090d;}
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn-dot{ width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.7;}
  .btn.primary.running .btn-dot{ animation:blink 1s infinite; }

  .slider-wrap{ margin-top:6px; }
  .slider-wrap .slabel{ display:flex; justify-content:space-between; font-size:10px; color:var(--sub); margin-bottom:6px; letter-spacing:.5px;}
  .slider-wrap .slabel span:last-child{ color:var(--mcolor); font-weight:700; font-family:'Consolas',monospace;}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:5px; border-radius:4px; background:var(--line); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:17px; height:17px; border-radius:50%; background:var(--mcolor);
    box-shadow:0 0 7px var(--mcolor), 0 2px 4px rgba(0,0,0,.4); cursor:pointer; border:2.5px solid var(--panel);
  }
  input[type=range]:disabled::-webkit-slider-thumb{ box-shadow:none; opacity:.5; }

  /* illustration canvas per machine */
  .illus{ height:148px; border-radius:11px;
    background:radial-gradient(120% 100% at 50% 0%, rgba(255,255,255,.05), transparent 60%), var(--panel2);
    border:1px solid var(--line);
    position:relative; overflow:hidden; margin-bottom:14px; flex-shrink:0;
    box-shadow:inset 0 0 24px rgba(0,0,0,.25);
  }
  .illus::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, transparent 70%, rgba(0,0,0,.18));
  }
  .illus svg{ width:100%; height:100%; position:relative; z-index:1; }
  .illus .ilabel{ position:absolute; bottom:7px; left:10px; font-size:8.5px; letter-spacing:1.5px; color:var(--mute); text-transform:uppercase; font-family:'Consolas',monospace; z-index:2;}
  .illus .ilabel b{ color:var(--mcolor); }

  /* animated parts — only animate while .illus.active */
  .ipart{ opacity:.35; transition:opacity .4s; }
  .illus.active .ipart{ opacity:1; }
  .illus.active .ip-rise{ animation:riseFloat 2.6s ease-in-out infinite; }
  .illus.active .ip-rise2{ animation:riseFloat 2.6s ease-in-out infinite .5s; }
  .illus.active .ip-rise3{ animation:riseFloat 2.6s ease-in-out infinite 1s; }
  @keyframes riseFloat{
    0%{ transform:translateY(0) scaleX(1); opacity:0; }
    15%{ opacity:.9; }
    100%{ transform:translateY(-26px) scaleX(1.3); opacity:0; }
  }
  .illus.active .ip-bub{ animation:bubbleUp 1.8s ease-in infinite; }
  .illus.active .ip-bub2{ animation:bubbleUp 1.8s ease-in infinite .4s; }
  .illus.active .ip-bub3{ animation:bubbleUp 1.8s ease-in infinite .9s; }
  @keyframes bubbleUp{
    0%{ transform:translateY(0); opacity:.9; }
    100%{ transform:translateY(-40px); opacity:0; }
  }
  .illus.active .ip-flicker{ animation:flick 1.4s ease-in-out infinite; }
  @keyframes flick{ 0%,100%{ opacity:.55; } 50%{ opacity:1; filter:drop-shadow(0 0 6px var(--mcolor)); } }
  .illus.active .ip-pulse{ animation:pulseGrow 1.6s ease-in-out infinite; }
  @keyframes pulseGrow{ 0%,100%{ opacity:.35; r:8; } 50%{ opacity:.85; r:13; } }
  .illus.active .ip-arc{ animation:arcMove 1.1s linear infinite; }
  @keyframes arcMove{ 0%{ stroke-dashoffset:0; } 100%{ stroke-dashoffset:-24; } }
  .illus .ip-needle{ transition:transform 1.2s cubic-bezier(.4,0,.2,1); transform-origin:200px 67px; }
  .illus .ip-doorlight{ transition:fill .4s, opacity .4s; }
 .illus svg{ width:100%; height:100%; }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

  @media (max-width:1100px){
    .grid{ grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); }
    .panel{ flex-direction:column; height:94vh; }
    .panel-left,.panel-right{ border-right:none; border-bottom:1px solid var(--line); }
  }
</style>
</head>
<body>
<div class="stage">

  <div class="topbar">
    <div class="brandwrap">
      <div class="title-main">STERI•CONSOLE</div>
      <div class="title-sub">Bảng điều khiển khử trùng mô phỏng</div>
    </div>
    <div style="display:flex; align-items:center; gap:18px;">
      <span class="pon">Pon</span>
      <div class="toggle-wrap">
        <span class="toggle-label">Tối</span>
        <div class="switch" id="themeSwitch" onclick="toggleTheme()"><div class="knob"></div></div>
        <span class="toggle-label">Sáng</span>
      </div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="panel" id="panel"></div>
</div>

<script>
/* ===================== DATA ===================== */
const methods = [
  {
    id:'autoclave', icon:'♨', color:'#22d3ee', color2:'#0891b2',
    name:'Hấp tiệt trùng', eng:'STEAM AUTOCLAVE STERILIZATION',
    tag:'Hơi nước bão hoà · áp suất cao',
    desc:'Sử dụng hơi nước bão hoà ở áp suất cao để tiêu diệt toàn bộ vi sinh vật, bao gồm bào tử chịu nhiệt. Đây là phương pháp khử trùng tiệt khuẩn cấp y tế được dùng rộng rãi nhất nhờ hiệu quả cao, an toàn và chi phí thấp.',
    steps:[
      ['1','Xếp dụng cụ vào khay, không chồng chéo để hơi tiếp xúc đều mọi bề mặt.'],
      ['2','Đóng và khoá kín cửa buồng hấp, kiểm tra gioăng cao su còn nguyên vẹn.'],
      ['3','Chọn chu trình phù hợp: 121°C/15 phút hoặc 134°C/3–4 phút.'],
      ['4','Máy hút khí, nạp hơi và giữ áp suất – nhiệt độ ổn định trong thời gian tiệt trùng.'],
      ['5','Xả áp từ từ, sấy khô dụng cụ trước khi mở cửa và lấy ra.']
    ],
    note:'<b>Lưu ý:</b> Không hấp dụng cụ kín khí hoặc vật liệu chịu nhiệt kém (nhựa PVC, cao su mỏng). Luôn kiểm tra chỉ thị hoá học/sinh học (Bowie-Dick test) mỗi đợt hấp để xác nhận hiệu quả tiệt trùng.',
    params:[['Nhiệt độ','121–134 °C'],['Áp suất','1–2.2 atm'],['Thời gian','3–30 phút'],['Hiệu lực','Diệt cả bào tử']],
    illus:`<svg viewBox="0 0 400 148">
      <rect x="36" y="16" width="190" height="116" rx="12" fill="none" stroke="var(--mcolor)" stroke-width="2.5" opacity="0.55"/>
      <circle cx="131" cy="74" r="42" fill="none" stroke="var(--mcolor)" stroke-width="2.5" opacity="0.4"/>
      <circle cx="131" cy="74" r="42" fill="var(--mcolor)" opacity="0.04"/>
      <circle class="ip-doorlight" id="ac_door" cx="131" cy="74" r="4" fill="var(--mcolor)" opacity="0.5"/>
      <rect x="95" y="100" width="72" height="6" rx="2" fill="var(--mcolor)" opacity="0.35"/>
      <g class="ipart ip-rise" opacity="0">
        <path d="M105 60 Q112 42 104 24" stroke="var(--mcolor)" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g class="ipart ip-rise2" opacity="0">
        <path d="M131 56 Q138 36 128 16" stroke="var(--mcolor)" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g class="ipart ip-rise3" opacity="0">
        <path d="M157 60 Q164 42 156 24" stroke="var(--mcolor)" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <line x1="252" y1="28" x2="252" y2="124" stroke="var(--line)" stroke-width="1"/>
      <text x="264" y="30" fill="var(--mute)" font-size="9" font-family="Consolas" letter-spacing="1">VAN AN TOÀN</text>
      <circle cx="280" cy="58" r="13" fill="none" stroke="var(--mcolor)" stroke-width="2" opacity="0.5"/>
      <circle class="ip-pulse ipart" cx="280" cy="58" r="8" fill="var(--mcolor)" opacity="0.35"/>
      <rect x="264" y="86" width="100" height="40" rx="6" fill="none" stroke="var(--mcolor)" opacity="0.35"/>
      <text x="270" y="100" fill="var(--mute)" font-size="8" font-family="Consolas">CỬA NẠP HƠI</text>
      <line x1="270" y1="108" x2="358" y2="108" stroke="var(--mcolor)" stroke-width="3" opacity="0.4" stroke-dasharray="6 4" class="ipart ip-arc"/>
      </svg>`,
    sim:(id,setVal)=>{}
  },
  {
    id:'dryheat', icon:'🔥', color:'#fb923c', color2:'#c2410c',

/* ===================== RENDER GRID ===================== */
const grid = document.getElementById('grid');
methods.forEach((m,i)=>{
  const card = document.createElement('div');
  card.className='card';
  card.style.setProperty('--mcolor', m.color);
  card.innerHTML = `
    <div class="glow"></div>
    <div class="pulse-dot"></div>
    <div class="num">0${i+1}</div>
    <div class="icon">${m.icon}</div>
    <div class="name">${m.name}</div>
    <div class="tag">${m.tag}</div>
  `;
  card.onclick = ()=>openPanel(m.id);
  grid.appendChild(card);
});

/* ===================== OVERLAY / PANEL ===================== */
const overlay = document.getElementById('overlay');
const panelEl = document.getElementById('panel');
let activeTimer = null;

function formatClock(totalSec){
  totalSec = Math.max(0, Math.round(totalSec));
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  if(h>0){
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function closePanel(){
  overlay.classList.remove('open');
  if(activeTimer) clearInterval(activeTimer);
}
overlay.addEventListener('click', e=>{ if(e.target===overlay) closePanel(); });

            <div class="big" id="bigVal">00:00<span class="cursor"></span></div>
            <div class="sline"><span id="statusTxt">— ĐANG CHỜ KÍCH HOẠT —</span><span id="pctTxt">0%</span></div>
            <div class="sline status"><span id="speedTxt">Thời gian thực: <b id="realDurTxt">—</b></span><span id="speedBadge"></span></div>
          </div>

          <div class="phasebar" id="phasebar"></div>

          <div class="gaugewrap">
            <div class="gauge">
              <svg viewBox="0 0 80 80">
                <circle class="gbg" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="0"/>
                <circle class="gval" id="gaugeTemp" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="201"/>
              </svg>
              <div class="gnum"><b id="tempNum">--</b><span>NHIỆT ĐỘ</span></div>
            </div>
            <div class="gauge">
              <svg viewBox="0 0 80 80">
                <circle class="gbg" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="0"/>
                <circle class="gval" id="gaugePress" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="201"/>
              </svg>
              <div class="gnum"><b id="pressNum">--</b><span id="pressLabel">ÁP SUẤT</span></div>
            </div>
            <div style="flex:1">
              <div class="slider-wrap">
                <div class="slabel"><span>Cường độ / Nồng độ tác nhân</span><span id="intensityVal">70%</span></div>
                <input type="range" min="20" max="100" value="70" id="intensitySlider">
              </div>
              <div class="slider-wrap">
                <div class="slabel"><span>Thời gian chu trình thực tế</span><span id="durVal">—</span></div>
                <input type="range" min="10" max="100" value="40" id="durSlider">
              </div>
            </div>
          </div>

          <div class="progress-shell">
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
            <div class="progress-marks"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
          </div>

          <div class="ctrl-row">
            <button class="btn primary" id="startBtn"><span class="btn-dot"></span>BẮT ĐẦU</button>
            <button class="btn" id="pauseBtn" disabled><span class="btn-dot"></span>TẠM DỪNG</button>
            <button class="btn" id="resetBtn"><span class="btn-dot"></span>ĐẶT LẠI</button>
          </div>
        </div>
      </div>
    </div>
  `;
  overlay.classList.add('open');
  initMachine(m);
}

/* ===================== MACHINE SIMULATION ===================== */
function initMachine(m){
  if(activeTimer) clearInterval(activeTimer);

  const tempTarget = ({autoclave:128, dryheat:170, chemical:24, uv:36, eto:50, plasma:46})[m.id];
  const tempUnit = m.id==='uv' ? ' °C' : ' °C';
  const pressLabel = ({autoclave:'ÁP SUẤT', dryheat:'NHIỆT KHÍ', chemical:'NỒNG ĐỘ', uv:'LIỀU UV', eto:'NỒNG ĐỘ KHÍ', plasma:'NĂNG LƯỢNG RF'})[m.id];
  const realDurationLabel = ({autoclave:'15–20 phút', dryheat:'60–120 phút', chemical:'20–45 phút', uv:'10–30 phút', eto:'3–6 giờ', plasma:'45–75 phút'})[m.id];
  // Actual representative real-world duration (giây) cho từng phương pháp — đồng hồ sẽ đếm ngược đúng theo mốc thật, chỉ tua nhanh tốc độ hiển thị
  const realSeconds = ({autoclave:18*60, dryheat:90*60, chemical:30*60, uv:20*60, eto:4*3600, plasma:60*60})[m.id];

  document.getElementById('pressLabel').textContent = pressLabel;
  document.getElementById('cycName').textContent = m.name.toUpperCase();
  document.getElementById('durVal').textContent = realDurationLabel;
  document.getElementById('realDurTxt').textContent = formatClock(realSeconds);

  // 5 phases mirroring the 5 practice steps
  const phaseNames = ['Chuẩn bị','Nạp/Khởi động','Gia nhiệt','Xử lý chính','Hoàn tất'];
  const phasebar = document.getElementById('phasebar');
  phasebar.innerHTML = phaseNames.map((p,i)=>`<div class="phase" id="phase${i}">${p}</div>`).join('');

  const illusBox = document.getElementById('illusBox');
  let running=false, progress=0;
  const simSeconds = 72; // thời gian chạy demo thật trên màn hình (giây đồng hồ tay)
  const speed = Math.round(realSeconds/simSeconds);
  document.getElementById('speedBadge').textContent = '⏩ TUA NHANH x'+speed;
  const startBtn=document.getElementById('startBtn');
  const pauseBtn=document.getElementById('pauseBtn');
  const resetBtn=document.getElementById('resetBtn');
  const intensitySlider=document.getElementById('intensitySlider');
  const durSlider=document.getElementById('durSlider');

  function setLeds(state){
    const l1=document.getElementById('led1'),l2=document.getElementById('led2'),l3=document.getElementById('led3');
    l1.classList.toggle('on', state===1);
    l2.classList.toggle('on', state===2);
    l3.classList.toggle('on', state===3);
  }

  function setPhase(activeIdx){
    for(let i=0;i<5;i++){
      const el=document.getElementById('phase'+i);
      el.classList.remove('active','done');
      if(i<activeIdx) el.classList.add('done');
      if(i===activeIdx) el.classList.add('active');
    }
  }

  function setGauge(id,pct){
    const el = document.getElementById(id);
    const offset = 201 - (201*Math.min(Math.max(pct,0),100)/100);
    el.style.strokeDashoffset = offset;
  }

  function render(){
    const intensity = +intensitySlider.value;
    document.getElementById('intensityVal').textContent = intensity+'%';

    const heatProgress = running ? Math.min(1,(progress/22)) : intensity/100*0.15;
    const curTemp = Math.round(tempTarget * heatProgress);
    document.getElementById('tempNum').textContent = tempTarget? curTemp+tempUnit : '—';

    const pressUnitMap = {autoclave:' atm', chemical:'%', eto:' mg/L', plasma:' W', dryheat:' °C', uv:' mJ/cm²'};
    const pressVal = m.id==='autoclave' ? (intensity*0.018).toFixed(1)
                    : m.id==='uv' ? Math.round(intensity*0.35)
                    : m.id==='plasma' ? Math.round(intensity*4)
                    : m.id==='eto' ? Math.round(intensity*9)
                    : m.id==='dryheat' ? curTemp
                    : intensity;
    document.getElementById('pressNum').textContent = pressVal + pressUnitMap[m.id];

    setGauge('gaugeTemp', running? Math.min(100,(progress/55)*100) : intensity*0.15);
    setGauge('gaugePress', intensity);
  }
  render();
  document.getElementById('bigVal').innerHTML = formatClock(realSeconds)+'<span class="cursor"></span>';
  intensitySlider.oninput = render;
  durSlider.oninput = ()=>{}; // cosmetic only — represents user-tunable cycle time

  const tickStep = 0.2; // giây đồng hồ tay mỗi nhịp
  function tick(){
    progress += tickStep;
    const pct = Math.min(100, Math.round(progress/simSeconds*100));
    document.getElementById('progFill').style.width = pct+'%';
    document.getElementById('progFill').classList.add('running');
    document.getElementById('pctTxt').textContent = pct+'%';
    const remainReal = Math.max(0, realSeconds*(1-progress/simSeconds));
    document.getElementById('bigVal').innerHTML = formatClock(remainReal)+'<span class="cursor"></span>';

    if(pct<10){
      document.getElementById('statusTxt').textContent='— ĐANG CHUẨN BỊ DỤNG CỤ —';
      setPhase(0); setLeds(1);
    } else if(pct<28){
      document.getElementById('statusTxt').textContent='— NẠP TÁC NHÂN / NIÊM PHONG BUỒNG —';
      setPhase(1); setLeds(1);
    } else if(pct<46){
      document.getElementById('statusTxt').textContent='— ĐANG GIA NHIỆT ĐẾN NGƯỠNG XỬ LÝ —';
      setPhase(2); setLeds(2);
    } else if(pct<92){
      document.getElementById('statusTxt').textContent='— ĐANG TIỆT TRÙNG / GIỮ THÔNG SỐ ỔN ĐỊNH —';
      setPhase(3); setLeds(2);
    } else {
      document.getElementById('statusTxt').textContent='— XẢ ÁP / THÔNG KHÍ —';
      setPhase(4); setLeds(2);
    }

    render();

    if(progress>=simSeconds){
      clearInterval(activeTimer); running=false;
      startBtn.disabled=false; startBtn.innerHTML='<span class="btn-dot"></span>BẮT ĐẦU LẠI';
      startBtn.classList.remove('running');
      pauseBtn.disabled=true;
      document.getElementById('statusTxt').textContent='✓ CHU TRÌNH HOÀN TẤT — AN TOÀN ĐỂ SỬ DỤNG';
      setPhase(5); setLeds(3);
      illusBox.classList.remove('active');
      document.getElementById('progFill').classList.remove('running');
    }
  }

  startBtn.onclick = ()=>{
    if(running) return;
    running=true;
    illusBox.classList.add('active');
    startBtn.disabled=true; startBtn.innerHTML='<span class="btn-dot"></span>ĐANG CHẠY';
    startBtn.classList.add('running');
    pauseBtn.disabled=false;
    if(activeTimer) clearInterval(activeTimer);
    activeTimer = setInterval(tick, 200);
  };
  pauseBtn.onclick = ()=>{
    running=false;
    clearInterval(activeTimer);
    illusBox.classList.remove('active');
    document.getElementById('progFill').classList.remove('running');
    startBtn.disabled=false; startBtn.innerHTML='<span class="btn-dot"></span>TIẾP TỤC';
    document.getElementById('statusTxt').textContent='— TẠM DỪNG —';
  };
  resetBtn.onclick = ()=>{
    running=false; progress=0;
    clearInterval(activeTimer);
    illusBox.classList.remove('active');
    document.getElementById('progFill').classList.remove('running');
    document.getElementById('progFill').style.width='0%';
    document.getElementById('pctTxt').textContent='0%';
    document.getElementById('bigVal').innerHTML=formatClock(realSeconds)+'<span class="cursor"></span>';
    document.getElementById('statusTxt').textContent='— ĐANG CHỜ KÍCH HOẠT —';
    startBtn.disabled=false; startBtn.innerHTML='<span class="btn-dot"></span>BẮT ĐẦU';
    startBtn.classList.remove('running');
    pauseBtn.disabled=true;
    setLeds(0); setPhase(-1);
    render();
  };

  setPhase(-1);
}


/* ===================== THEME TOGGLE ===================== */
function toggleTheme(){
  document.body.classList.toggle('light');
}

/* close on ESC */
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });
</script>
